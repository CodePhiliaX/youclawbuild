name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Job 1: 所有平台构建 ──
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            build_arg: "--win --x64"
            artifact: "You-Claw-${VERSION}.exe"
            platform_label: "Windows x64"
          - os: macos-latest
            arch: x64
            build_arg: "--mac --x64"
            artifact: "You-Claw-${VERSION}-x64.dmg"
            platform_label: "macOS Intel"
          - os: macos-latest
            arch: arm64
            build_arg: "--mac --arm64"
            artifact: "You-Claw-${VERSION}-arm64.dmg"
            platform_label: "macOS Apple Silicon"
          - os: ubuntu-latest
            arch: x64
            build_arg: "--linux --x64"
            artifact: "You-Claw-${VERSION}-x86_64.AppImage"
            platform_label: "Linux x64"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform_label }}

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Set version
        run: pnpm pkg set version=${{ steps.version.outputs.VERSION }}

      - name: Build
        run: pnpm run build

      - name: Import macOS certificates
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}

      # macOS / Linux: 打包并直接发布到 GitHub Release
      - name: Package & Publish (macOS/Linux)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder ${{ matrix.build_arg }} --publish always

      # Windows: 只打包不发布（等签名后再上传）
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: pnpm exec electron-builder ${{ matrix.build_arg }} --publish never

      # Windows: 上传未签名 exe 为 artifact，传给下一个 job
      - name: Upload unsigned exe as artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe
          path: release/*.exe
          retention-days: 1

      - name: Resolve artifact name
        id: artifact
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NAME=$(echo '${{ matrix.artifact }}' | sed "s/\${VERSION}/$VERSION/g")
          echo "NAME=$NAME" >> $GITHUB_OUTPUT
          echo "URL=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$NAME" >> $GITHUB_OUTPUT

      - name: Notify Feishu
        if: runner.os != 'Windows'
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · ${{ matrix.platform_label }} ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"
                - - tag: text
                    text: "Download: "
                  - tag: a
                    text: "${{ steps.artifact.outputs.NAME }}"
                    href: "${{ steps.artifact.outputs.URL }}"

  # ── Job 2: 在 self-hosted Mac（插 U 盾）上签名 ──
  sign-windows:
    needs: build
    runs-on: self-hosted
    name: Sign Windows exe

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 从 Job 1 下载未签名 exe
      - name: Download unsigned exe
        uses: actions/download-artifact@v4
        with:
          name: unsigned-exe
          path: unsigned

      # 用 U 盾签名（jsign + SafeNet PKCS#11）
      - name: Sign exe with USB token
        shell: bash
        run: |
          EXE_PATH=$(ls unsigned/*.exe | head -1)
          echo "Signing: $EXE_PATH"
          java -jar /Users/chat2db/Documents/winsign/jsign-6.0.jar \
            --keystore /Users/chat2db/Documents/winsign/hardwareToken.cfg \
            --storepass "${{ secrets.STOREPASS }}" \
            --storetype PKCS11 \
            --tsaurl http://timestamp.digicert.com \
            --alias Sectigo_20250108083559 \
            "$EXE_PATH"

      # 签名后上传到 GitHub Release
      - name: Upload signed exe to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          EXE_NAME="You-Claw-${VERSION}.exe"
          gh release upload "${{ github.ref_name }}" "unsigned/$EXE_NAME" --clobber

      - name: Notify Feishu
        uses: foxundermoon/feishu-action@v2
        if: always()
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · Windows x64 签名 ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "签名 "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

      # 清理工作目录
      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf unsigned
