name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            build_arg: "--win --x64"
            artifact: "You-Claw-${VERSION}.exe"
            platform_label: "Windows x64"
          - os: macos-latest
            arch: x64
            build_arg: "--mac --x64"
            artifact: "You-Claw-${VERSION}-x64.dmg"
            platform_label: "macOS Intel"
          - os: macos-latest
            arch: arm64
            build_arg: "--mac --arm64"
            artifact: "You-Claw-${VERSION}-arm64.dmg"
            platform_label: "macOS Apple Silicon"
          - os: ubuntu-latest
            arch: x64
            build_arg: "--linux --x64"
            artifact: "You-Claw-${VERSION}-x86_64.AppImage"
            platform_label: "Linux x64"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform_label }}

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Set version
        run: pnpm pkg set version=${{ steps.version.outputs.VERSION }}

      - name: Build
        run: pnpm run build

      - name: Import macOS certificates
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: Package & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm exec electron-builder ${{ matrix.build_arg }} --publish always

      - name: Resolve artifact name
        id: artifact
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NAME=$(echo '${{ matrix.artifact }}' | sed "s/\${VERSION}/$VERSION/g")
          echo "NAME=$NAME" >> $GITHUB_OUTPUT
          echo "URL=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$NAME" >> $GITHUB_OUTPUT

      - name: Notify Feishu
        uses: foxundermoon/feishu-action@v2
        if: always()
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "You Claw v${{ steps.version.outputs.VERSION }} · ${{ matrix.platform_label }} ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "构建 "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && '成功' || '失败' }}"
                - - tag: text
                    text: "下载: "
                  - tag: a
                    text: "${{ steps.artifact.outputs.NAME }}"
                    href: "${{ steps.artifact.outputs.URL }}"
